services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: roadshowops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d roadshowops"]
      interval: 3s
      timeout: 5s
      retries: 40

  backend:
    build:
      context: ./backend
    image: roadshowops-backend:latest
    environment:
      HOST: 0.0.0.0
      PORT: "4000"
      LOG_LEVEL: info
      DATABASE_URL: postgres://postgres:postgres@db:5432/roadshowops
      PGHOST: db
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: roadshowops
      CORS_ORIGIN: http://localhost:3000
      JWT_SECRET: dev-only-jwt-secret-please-change-in-production-xxxxxxxxxxxxx
      JWT_EXPIRES_IN: 12h
      BCRYPT_COST: "10"
      FIELD_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      WECHAT_SHARED_SECRET: dev-only-wechat-hmac-secret
      WECHAT_IMPORT_DIR: /app/wechat_imports
      INGESTION_ROOT_DIR: /app/ingestion_inbox
      PASSWORD_MIN_LENGTH: "12"
      LOCKOUT_THRESHOLD: "5"
      LOCKOUT_MINUTES: "15"
      PAYMENT_RETRY_MAX: "3"
      PAYMENT_RETRY_INTERVAL_MINUTES: "5"
      INGESTION_SCHEDULER_INTERVAL_MINUTES: "5"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: "RoadshowOpsAdmin1!"
      ADMIN_EMAIL: admin@local
      ADMIN_NAME: Administrator
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ./database:/app/database:ro
      - ./unit_tests:/app/unit_tests:ro
      - ./API_tests:/app/API_tests:ro
      - wechat_imports:/app/wechat_imports
      - ingestion_inbox:/app/ingestion_inbox

  frontend:
    build:
      context: ./frontend
    image: roadshowops-frontend:latest
    environment:
      VITE_PORT: "3000"
      VITE_API_PROXY: http://backend:4000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
  wechat_imports:
  ingestion_inbox:
